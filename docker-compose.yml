services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: course-registration-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_ENGINE: sqlite
      USE_AWS_SECRETS: "false"
      DJANGO_SECRET_KEY: "dev-local-secret-key-change-me"
      AWS_REGION: ap-southeast-1
      DYNAMODB_REGION: ap-southeast-1
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://course-reg-frontend-667467573689.s3-website-ap-southeast-1.amazonaws.com"
    volumes:
      - ./backend:/app
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: course-registration-frontend
    ports:
      - "80:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
